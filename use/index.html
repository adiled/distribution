<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>distribution / @adiled</title>
  <meta name="color-scheme" content="dark light">
  <style>
    :root {
      --bg: #0e0e10;
      --fg: #e8e6e3;
      --muted: #8a8682;
      --accent: #d4a574;
      --line: #2a2a2c;
      --warn: #c97a4a;
      --blue: #5a8ec9;
      --red: #c95a5a;
      --green: #6c8c5d;
      --t1: #c9b48a;
      --t2: #8da77b;
      --t3: #b08a5a;
      --t4: #6a6a6a;
      --t5: #4a4a4a;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #faf8f5;
        --fg: #1a1a1a;
        --muted: #6a6a6a;
        --accent: #8a5a2a;
        --line: #d8d4ce;
        --blue: #2a5a8a;
        --red: #a23a3a;
        --green: #4a6a3a;
        --t1: #6a4a1a;
        --t2: #4a6a3a;
        --t3: #8a5a2a;
        --t4: #8a8a8a;
        --t5: #aaaaaa;
      }
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 2rem 1.25rem 4rem;
      max-width: 1100px;
      margin-inline: auto;
    }
    code, .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    h1 { font-size: 1.5rem; margin: 0 0 .25rem; font-weight: 500; letter-spacing: -.01em; }
    h2 { font-size: 1.05rem; margin: 2.5rem 0 .75rem; font-weight: 600; letter-spacing: -.005em; }
    .meta { color: var(--muted); font-size: .85rem; margin: 0 0 .5rem; }
    .meta a { color: var(--muted); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td {
      text-align: left;
      padding: .5rem .65rem;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th { font-weight: 500; color: var(--muted); font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; }
    td.repo { white-space: nowrap; }
    td.note { color: var(--muted); font-size: .85rem; }
    .tier { display: inline-block; padding: .1rem .4rem; border-radius: 3px; font-size: .7rem; font-weight: 600; letter-spacing: .03em; color: var(--bg); }
    .tier-T1 { background: var(--t1); }
    .tier-T2 { background: var(--t2); }
    .tier-T3 { background: var(--t3); }
    .tier-T4 { background: var(--t4); }
    .tier-T5 { background: var(--t5); }
    .pri { display: inline-block; padding: .1rem .35rem; border-radius: 3px; font-size: .7rem; font-weight: 600; }
    .pri-P0 { background: var(--warn); color: var(--bg); }
    .pri-P1 { background: var(--accent); color: var(--bg); }
    .pri-P2 { background: var(--muted); color: var(--bg); }
    .s {
      display: inline-block;
      min-width: 1.4em;
      padding: 0 .35em;
      text-align: center;
      border-radius: 3px;
      font: 700 .75rem/1.6 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: #fff;
    }
    .s-O { background: var(--blue); }
    .s-C { background: var(--red); }
    .s-R { background: var(--green); }
    .s-q { background: var(--muted); }
    .num { color: var(--muted); }
    .skeleton td { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>distribution</h1>
    <p class="meta">
      <a href="https://github.com/adiled">@adiled</a> portfolio.
      Stencil over <a href="../projects.json">projects.json</a> and <a href="../asks.json">asks.json</a>. Click any row to reach live state on GitHub.
    </p>
  </header>

  <section>
    <h2>Projects</h2>
    <table id="projects">
      <thead>
        <tr>
          <th>Repo</th>
          <th>Tier</th>
          <th>Note</th>
          <th>Dossier</th>
        </tr>
      </thead>
      <tbody><tr class="skeleton"><td colspan="4">loading...</td></tr></tbody>
    </table>
  </section>

  <section>
    <h2>Asks</h2>
    <table id="asks">
      <thead>
        <tr>
          <th>Repo</th>
          <th>#</th>
          <th>State</th>
          <th>Pri</th>
          <th>Note</th>
        </tr>
      </thead>
      <tbody><tr class="skeleton"><td colspan="5">loading...</td></tr></tbody>
    </table>
  </section>

  <script>
  (async () => {
    const escape = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    const repoUrl = (r) => "https://github.com/" + r;
    const issueUrl = (r, n) => repoUrl(r) + "/issues/" + n;
    const dossierUrl = (path) => "https://github.com/adiled/distribution/blob/main/" + path;

    const askGlyph = (a) => {
      const s = a.state || "open";
      if (s === "open") return "O";
      if (s === "closed-resolved") return "R";
      if (s.startsWith("closed")) return "C";
      return "q";
    };

    const [projects, asks] = await Promise.all([
      fetch("../projects.json").then(r => r.json()),
      fetch("../asks.json").then(r => r.json()),
    ]);

    document.querySelector("#projects tbody").innerHTML = projects.projects.map(p => `
      <tr>
        <td class="repo mono"><a href="${repoUrl(p.repo)}">${escape(p.repo)}</a></td>
        <td><span class="tier tier-${p.tier}">${p.tier}</span></td>
        <td class="note">${escape(p.note || "")}</td>
        <td><a href="${dossierUrl(p.dossier)}">md</a></td>
      </tr>`).join("");

    document.querySelector("#asks tbody").innerHTML = asks.tracked.map(a => {
      const g = askGlyph(a);
      return `
        <tr>
          <td class="repo mono"><a href="${repoUrl(a.repo)}">${escape(a.repo)}</a></td>
          <td class="num"><a href="${issueUrl(a.repo, a.number)}">#${a.number}</a></td>
          <td><span class="s s-${g}" title="${escape(a.state || "open")}">${g === "q" ? "?" : g}</span></td>
          <td><span class="pri pri-${a.priority}">${a.priority}</span></td>
          <td class="note">${escape(a.note || "")}</td>
        </tr>`;
    }).join("");
  })();
  </script>
</body>
</html>
