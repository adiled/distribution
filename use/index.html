<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>distribution / @adiled</title>
  <meta name="color-scheme" content="dark light">
  <style>
    :root {
      --bg: #0e0e10;
      --fg: #e8e6e3;
      --muted: #8a8682;
      --accent: #d4a574;
      --line: #2a2a2c;
      --warn: #c97a4a;
      --blue: #5a8ec9;
      --red: #c95a5a;
      --green: #6c8c5d;
      --t1: #c9b48a;
      --t2: #8da77b;
      --t3: #b08a5a;
      --t4: #6a6a6a;
      --t5: #4a4a4a;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #faf8f5;
        --fg: #1a1a1a;
        --muted: #6a6a6a;
        --accent: #8a5a2a;
        --line: #d8d4ce;
        --blue: #2a5a8a;
        --red: #a23a3a;
        --green: #4a6a3a;
        --t1: #6a4a1a;
        --t2: #4a6a3a;
        --t3: #8a5a2a;
        --t4: #8a8a8a;
        --t5: #aaaaaa;
      }
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 2rem 1.25rem 4rem;
      max-width: 1100px;
      margin-inline: auto;
    }
    code, .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    h2 { font-size: 1.05rem; margin: 2rem 0 .75rem; font-weight: 600; letter-spacing: -.005em; }
    h2:first-child { margin-top: 0; }
    section:first-of-type h2 { margin-top: 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td {
      text-align: left;
      padding: .5rem .65rem;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th { font-weight: 500; color: var(--muted); font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; }
    td.repo { white-space: nowrap; }
    td.note { color: var(--muted); font-size: .85rem; }
    .tier { display: inline-block; padding: .1rem .4rem; border-radius: 3px; font-size: .7rem; font-weight: 600; letter-spacing: .03em; color: var(--bg); }
    .tier-T1 { background: var(--t1); }
    .tier-T2 { background: var(--t2); }
    .tier-T3 { background: var(--t3); }
    .tier-T4 { background: var(--t4); }
    .tier-T5 { background: var(--t5); }
    .pri { display: inline-block; padding: .1rem .35rem; border-radius: 3px; font-size: .7rem; font-weight: 600; }
    .pri-P0 { background: var(--warn); color: var(--bg); }
    .pri-P1 { background: var(--accent); color: var(--bg); }
    .pri-P2 { background: var(--muted); color: var(--bg); }
    .s {
      display: inline-block;
      line-height: 1;
      vertical-align: middle;
    }
    .s::before { content: "●"; font-size: 1rem; }
    .s-O::before { color: var(--blue); }
    .s-C::before { color: var(--red); }
    .s-R::before { color: var(--green); }
    .s-q::before { color: var(--muted); }
    .num { color: var(--muted); }
    .skeleton td { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <section>
    <h2>Projects</h2>
    <table id="projects">
      <thead>
        <tr>
          <th>Repo</th>
          <th>Tier</th>
          <th>Note</th>
          <th>Dossier</th>
        </tr>
      </thead>
      <tbody><tr class="skeleton"><td colspan="4">loading...</td></tr></tbody>
    </table>
  </section>

  <section>
    <h2>Asks</h2>
    <table id="asks">
      <thead>
        <tr>
          <th>Repo</th>
          <th>#</th>
          <th title="Curated state from asks.json">Ask</th>
          <th title="Live state from GitHub">Issue</th>
          <th>Pri</th>
          <th>Note</th>
        </tr>
      </thead>
      <tbody><tr class="skeleton"><td colspan="6">loading...</td></tr></tbody>
    </table>
  </section>

  <script>
  (async () => {
    const TTL = 5 * 60 * 1000;
    const KEY = "dist-cache:v1:";

    const escape = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    const repoUrl = (r) => "https://github.com/" + r;
    const issueUrl = (r, n) => repoUrl(r) + "/issues/" + n;
    const dossierUrl = (path) => "https://github.com/adiled/distribution/blob/main/" + path;

    const askGlyph = (a) => {
      const s = a.state || "open";
      if (s === "open") return "O";
      if (s === "closed-resolved") return "R";
      if (s.startsWith("closed")) return "C";
      return "q";
    };
    const liveGlyph = (live) => {
      if (!live) return "q";
      if (live.state === "open") return "O";
      if (live.state === "closed") return "C";
      return "q";
    };

    async function gh(url) {
      const k = KEY + url;
      let cached = null;
      try { cached = JSON.parse(localStorage.getItem(k) || "null"); } catch (_) {}
      if (cached && (Date.now() - cached.ts) < TTL) return cached.data;
      try {
        const res = await fetch(url);
        if (!res.ok) return cached ? cached.data : null;
        const data = await res.json();
        try { localStorage.setItem(k, JSON.stringify({ ts: Date.now(), data })); } catch (_) {}
        return data;
      } catch (_) {
        return cached ? cached.data : null;
      }
    }

    const [projects, asks] = await Promise.all([
      fetch("../projects.json").then(r => r.json()),
      fetch("../asks.json").then(r => r.json()),
    ]);

    const askRepos = [...new Set(asks.tracked.map(a => a.repo))];
    const searchQuery = "is:issue " + askRepos.map(r => "repo:" + r).join(" ");
    const issuesResp = await gh(
      "https://api.github.com/search/issues?q=" + encodeURIComponent(searchQuery) + "&per_page=100"
    );

    const issueBy = {};
    for (const it of (issuesResp?.items || [])) {
      const repo = String(it.repository_url || "").replace("https://api.github.com/repos/", "");
      issueBy[repo + "#" + it.number] = it;
    }

    document.querySelector("#projects tbody").innerHTML = projects.projects.map(p => `
      <tr>
        <td class="repo mono"><a href="${repoUrl(p.repo)}">${escape(p.repo)}</a></td>
        <td><span class="tier tier-${p.tier}">${p.tier}</span></td>
        <td class="note">${escape(p.note || "")}</td>
        <td><a href="${dossierUrl(p.dossier)}">md</a></td>
      </tr>`).join("");

    document.querySelector("#asks tbody").innerHTML = asks.tracked.map(a => {
      const askG = askGlyph(a);
      const live = issueBy[a.repo + "#" + a.number];
      const liveG = liveGlyph(live);
      return `
        <tr>
          <td class="repo mono"><a href="${repoUrl(a.repo)}">${escape(a.repo)}</a></td>
          <td class="num"><a href="${issueUrl(a.repo, a.number)}">#${a.number}</a></td>
          <td><span class="s s-${askG}" title="ask: ${escape(a.state || "open")}"></span></td>
          <td><span class="s s-${liveG}" title="issue: ${escape(live?.state || "unknown")}"></span></td>
          <td><span class="pri pri-${a.priority}">${a.priority}</span></td>
          <td class="note">${escape(a.note || "")}</td>
        </tr>`;
    }).join("");
  })();
  </script>
</body>
</html>
